name: 🚀 Deploy to EC2 (Optimized)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "📍 Moving to project folder..."
          cd /opt/tradingbot/forex-ai-trading-bot

          echo "📥 Pulling latest code (main branch)..."
          git fetch origin
          git reset --hard origin/main

          echo "🧹 Cleaning old containers..."
          docker compose down

          echo "🐳 Building & starting containers..."
          docker compose up --build -d

          echo "⏳ Waiting for services..."
          sleep 20

          echo "📊 Container status:"
          docker ps

          echo "🧾 Backend logs:"
          docker logs --tail 50 indian-market-ai-backend || true

          echo "✅ Deploy finished"

          