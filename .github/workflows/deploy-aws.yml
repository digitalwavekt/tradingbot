name: 🚀 Deploy Trading Bot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Setup Docker
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔥 BUILD BACKEND
    - name: 🏗 Build & Push Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/tradingbot-backend ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/tradingbot-backend

    # 🔥 BUILD FRONTEND
    - name: 🏗 Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/tradingbot-frontend ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/tradingbot-frontend

    # 🚀 DEPLOY TO EC2
    - name: 🚀 Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /opt/tradingbot/forex-ai-trading-bot
          bash deploy.sh