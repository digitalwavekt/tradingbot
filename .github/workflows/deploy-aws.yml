name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - "forex-ai-trading-bot/backend/**"
      - ".github/workflows/deploy-aws.yml"

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/trading-backend.pem
          chmod 600 ~/.ssh/trading-backend.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/trading-backend.pem \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /opt/tradingbot/forex-ai-trading-bot/backend && ./deploy.sh"