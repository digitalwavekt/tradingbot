  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indian-market-ai-backend
    restart: unless-stopped
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DHAN_CLIENT_ID=${DHAN_CLIENT_ID}
      - DHAN_ACCESS_TOKEN=${DHAN_ACCESS_TOKEN}
      - DHAN_API_BASE_URL=${DHAN_API_BASE_URL}
      - DHAN_WS_URL=${DHAN_WS_URL}
      - TRADING_MODE=${TRADING_MODE:-LEARNING}
      - ALLOW_LIVE_TRADING=${ALLOW_LIVE_TRADING:-false}
      - ENABLE_KILL_SWITCH=${ENABLE_KILL_SWITCH:-false}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-true}
      - WATCHLIST_MODE=${WATCHLIST_MODE:-INDEX}
      - WATCHLIST_INDICES=${WATCHLIST_INDICES:-NIFTY50,SENSEX}
      - MAX_SYMBOLS_PER_CYCLE=${MAX_SYMBOLS_PER_CYCLE:-15}
      - MAX_MARKET_SYNC_SYMBOLS_PER_CYCLE=${MAX_MARKET_SYNC_SYMBOLS_PER_CYCLE:-15}
      - MAX_ANALYSIS_SYMBOLS_PER_CYCLE=${MAX_ANALYSIS_SYMBOLS_PER_CYCLE:-15}
      - SYMBOL_ANALYSIS_DELAY_MS=${SYMBOL_ANALYSIS_DELAY_MS:-2000}
      - ENABLE_LEARNING_ANALYSIS=${ENABLE_LEARNING_ANALYSIS:-true}
    depends_on:
      - redis
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/.env:/app/.env
    networks:
      - indian-market-network