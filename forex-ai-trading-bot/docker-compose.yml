services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indian-market-ai-backend
    restart: unless-stopped
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DHAN_CLIENT_ID=${DHAN_CLIENT_ID}
      - DHAN_ACCESS_TOKEN=${DHAN_ACCESS_TOKEN}
      - DHAN_API_BASE_URL=${DHAN_API_BASE_URL}
      - DHAN_WS_URL=${DHAN_WS_URL}
      - TRADING_MODE=${TRADING_MODE:-LEARNING}
      - ALLOW_LIVE_TRADING=${ALLOW_LIVE_TRADING:-false}
      - ENABLE_KILL_SWITCH=${ENABLE_KILL_SWITCH:-false}
      - ENABLE_DHAN_AUTO_TOKEN=${ENABLE_DHAN_AUTO_TOKEN:-true}
      - DHAN_ACCESS_TOKEN=${DHAN_ACCESS_TOKEN:-}
      - ENABLE_DHAN_HISTORICAL_SYNC=${ENABLE_DHAN_HISTORICAL_SYNC:-true}
      - ENABLE_CANDLE_SYNC=${ENABLE_CANDLE_SYNC:-true}
      - ENABLE_MARKET_SYNC=${ENABLE_MARKET_SYNC:-true}
      - ANALYSIS_TIMEFRAMES=${ANALYSIS_TIMEFRAMES:-1m,5m,15m,1h,1D}
      - REQUIRED_TIMEFRAMES=${REQUIRED_TIMEFRAMES:-15m,1h,1D}
      - MIN_CANDLE_COUNT_15M=${MIN_CANDLE_COUNT_15M:-50}
      - MIN_CANDLE_COUNT_1H=${MIN_CANDLE_COUNT_1H:-30}
      - MIN_CANDLE_COUNT_1D=${MIN_CANDLE_COUNT_1D:-4}
    depends_on:
      - redis
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/.env:/app/.env
    networks:
      - indian-market-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:5000
    container_name: indian-market-ai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - indian-market-network

  redis:
    image: redis:7-alpine
    container_name: indian-market-ai-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - indian-market-network

  nginx:
    image: nginx:alpine
    container_name: indian-market-ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - indian-market-network

volumes:
  redis-data:

networks:
  indian-market-network:
    driver: bridge
