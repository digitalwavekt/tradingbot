events {}

http {
    upstream backend {
        server backend:5000;
    }
    upstream frontend {
        server frontend:3000;
    }

    # ===== FRONTEND =====
    server {
        listen 80;
        server_name trading.digitalwaveitsolution.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name trading.digitalwaveitsolution.online;

        ssl_certificate     /etc/letsencrypt/live/trading.digitalwaveitsolution.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/trading.digitalwaveitsolution.online/privkey.pem;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ===== BACKEND API =====
    server {
        listen 80;
        server_name trading-api.digitalwaveitsolution.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name trading-api.digitalwaveitsolution.online;

        ssl_certificate     /etc/letsencrypt/live/trading-api.digitalwaveitsolution.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/trading-api.digitalwaveitsolution.online/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
